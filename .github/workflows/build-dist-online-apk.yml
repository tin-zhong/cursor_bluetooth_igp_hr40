name: Build dist Online APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'scripts/**'
      - 'gradle/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - 'dist-online/keystore/**'
      - '.github/workflows/build-dist-online-apk.yml'

env:
  # 强制所有 JS action 使用 Node 24，消除 Node 20 弃用警告。
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve version
        id: meta
        run: |
          VERSION_NAME="$(awk -F'"' '/versionName/ {print $2; exit}' app/build.gradle)"
          echo "version=${VERSION_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set up Android SDK
        run: ./scripts/setup_android_env.sh

      - name: Build signed Online dist APK
        env:
          HR40_ONLINE_DISTRIBUTION_KEYSTORE_BASE64: ${{ secrets.HR40_ONLINE_DISTRIBUTION_KEYSTORE_BASE64 }}
          RELEASE_DIST_APK: '1'
        run: |
          export ANDROID_HOME="${ANDROID_HOME:-$HOME/android-sdk}"
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          export PATH="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin:${ANDROID_SDK_ROOT}/platform-tools:${PATH}"
          ./scripts/build_dist_online_apk.sh

      - name: Upload APK artifact
        uses: actions/upload-artifact@v6
        with:
          name: hr40-online-fitness-dist
          # 仅上传本次构建的最新正式版与 debug，避免打包历史版本。
          path: |
            dist-online/hr40-online-fitness-v${{ steps.meta.outputs.version }}.apk
            dist-online/hr40-online-fitness-debug.apk
          if-no-files-found: error
