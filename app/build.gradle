plugins {
    id "com.android.application"
}

def distributionKeystorePropertiesFile = rootProject.file("keystore/hr40-distribution.properties")
def distributionKeystoreProperties = new Properties()
def distributionKeystoreFile = null
if (distributionKeystorePropertiesFile.exists()) {
    distributionKeystoreProperties.load(new FileInputStream(distributionKeystorePropertiesFile))
    distributionKeystoreFile = rootProject.file("keystore/" + distributionKeystoreProperties["storeFile"])
}

android {
    namespace "com.cursor.hr40"
    compileSdk 35

    defaultConfig {
        applicationId "com.cursor.hr40"
        minSdk 26
        targetSdk 35
        versionCode 25
        versionName "3.5.0"
    }

    signingConfigs {
        if (distributionKeystoreFile != null && distributionKeystoreFile.exists()) {
            distribution {
                storeFile distributionKeystoreFile
                storePassword distributionKeystoreProperties["storePassword"]
                keyAlias distributionKeystoreProperties["keyAlias"]
                keyPassword distributionKeystoreProperties["keyPassword"]
            }
        }
    }

    buildTypes {
        debug {
            if (signingConfigs.findByName("distribution") != null) {
                signingConfig signingConfigs.distribution
            }
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation "androidx.appcompat:appcompat:1.7.0"
    implementation "com.google.android.material:material:1.12.0"
    implementation "androidx.room:room-runtime:2.8.4"
    annotationProcessor "androidx.room:room-compiler:2.8.4"
}
